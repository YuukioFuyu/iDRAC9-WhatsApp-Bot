# ═══════════════════════════════════════════════════════
# iDRAC9 WhatsApp Bot — MikroTik Container Edition
# ═══════════════════════════════════════════════════════
# Simplified compose for LOCAL TESTING only.
# On MikroTik, use: /container/add remote-image=...
#
# Usage:
#   docker compose up -d
#   docker compose logs -f

version: '3.9'

services:
  erina:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: erina-delvra-foren
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000" # Web Dashboard + WhatsApp Bot
      - "5432:5432" # PostgreSQL (backup/restore access)
    env_file:
      - .env
    environment:
      - TZ=${TZ:-Asia/Jakarta}
    volumes:
      - erina-data:/data # PostgreSQL + Models + Sessions

volumes:
  erina-data:
