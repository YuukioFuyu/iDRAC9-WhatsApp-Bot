; ═══════════════════════════════════════════════════════
; supervisord — Process Manager for MikroTik Container
; ═══════════════════════════════════════════════════════
;
; Manages 3 services in priority order:
;   10. PostgreSQL 16 (database must be ready first)
;   20. Python FastAPI (Redfish bridge, needs PG for health)
;   30. Node.js Fastify (WhatsApp bot + dashboard)
;
; All logs go to stdout/stderr for MikroTik Container Logs.

[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor

; ─────────────────────────────────────────────────────
; PostgreSQL 16 — Erina Memories + Application Database
; ─────────────────────────────────────────────────────
[program:postgresql]
command=/usr/lib/postgresql/16/bin/postgres -D /data/pgdata
user=postgres
autostart=true
autorestart=true
priority=10
startsecs=5
stopwaitsecs=30
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

; ─────────────────────────────────────────────────────
; Python FastAPI — Redfish Bridge (internal only)
; Binds to 127.0.0.1:8000 — not exposed externally
; ─────────────────────────────────────────────────────
[program:python-api]
command=/usr/local/bin/uvicorn app.main:app --host 127.0.0.1 --port 8000 --log-level info
directory=/app/python-api
autostart=true
autorestart=true
priority=20
startsecs=3
startretries=10
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=PYTHONUNBUFFERED="1"

; ─────────────────────────────────────────────────────
; Node.js Fastify — WhatsApp Bot + Web Dashboard
; ─────────────────────────────────────────────────────
[program:node-app]
command=node src/app.js
directory=/app/node-app
autostart=true
autorestart=true
priority=30
startsecs=5
startretries=10
stopwaitsecs=15
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=NODE_ENV="production",TRANSFORMERS_CACHE="/data/models"
